name: Accessibility Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install scanner tools
        run: npm install --no-save @axe-core/playwright wait-on

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build -w frontend

      - name: Start app
        run: npm run start:test -w frontend &
        env:
          NODE_ENV: test

      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run accessibility scan
        run: node scripts/a11y-check.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: |
            a11y-report.json
            a11y-report.md

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('a11y-report.md')
              ? fs.readFileSync('a11y-report.md', 'utf8')
              : 'Accessibility scan did not produce a report.';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
